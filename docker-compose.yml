version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: terranaut-db
    environment:
      POSTGRES_USER: terranaut
      POSTGRES_PASSWORD: password
      POSTGRES_DB: terranaut
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
